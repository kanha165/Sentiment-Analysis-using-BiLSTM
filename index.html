<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AI Sentiment Analyzer</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f172a;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:700px;
            background:#1e293b;
            padding:30px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        h1{
            color:white;
            text-align:center;
            margin-bottom:10px;
        }

        p{
            color:#cbd5e1;
            text-align:center;
            margin-bottom:25px;
        }

        textarea{
            width:100%;
            height:150px;
            padding:15px;
            border:none;
            outline:none;
            border-radius:12px;
            resize:none;
            font-size:16px;
            background:#334155;
            color:white;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:12px;
            background:#3b82f6;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2563eb;
        }

        .result{
            margin-top:25px;
            background:#334155;
            padding:20px;
            border-radius:15px;
            display:none;
        }

        .result h2{
            color:white;
            margin-bottom:15px;
        }

        .result p{
            text-align:left;
            margin:8px 0;
            color:#f1f5f9;
        }

        .positive{
            color:#22c55e;
            font-weight:bold;
        }

        .negative{
            color:#ef4444;
            font-weight:bold;
        }

        .loading{
            text-align:center;
            color:white;
            margin-top:20px;
            display:none;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>AI Sentiment Analyzer</h1>

        <p>
            Real-Time Twitter Sentiment Analysis using BiLSTM
        </p>

        <textarea
            id="textInput"
            placeholder="Enter your text here..."
        ></textarea>

        <button onclick="analyzeSentiment()">
            Analyze Sentiment
        </button>

        <div class="loading" id="loading">
            Analyzing...
        </div>

        <div class="result" id="result">

            <h2>Prediction Result</h2>

            <p>
                <strong>Input Text:</strong>
                <span id="inputText"></span>
            </p>

            <p>
                <strong>Cleaned Text:</strong>
                <span id="cleanedText"></span>
            </p>

            <p>
                <strong>Sentiment:</strong>
                <span id="sentiment"></span>
            </p>

            <p>
                <strong>Confidence Score:</strong>
                <span id="confidence"></span>
            </p>

        </div>

    </div>


    <script>

        async function analyzeSentiment(){

            const text = document.getElementById("textInput").value;

            const loading = document.getElementById("loading");

            const result = document.getElementById("result");

            if(text.trim() === ""){

                alert("Please enter some text");

                return;
            }

            loading.style.display = "block";

            result.style.display = "none";

            try{

                const response = await fetch(
                    "https://programmes-darwin-stroke-roll.trycloudflare.com/predict",
                    {
                        method:"POST",

                        headers:{
                            "Content-Type":"application/json"
                        },

                        body:JSON.stringify({
                            text:text
                        })
                    }
                );

                const data = await response.json();

                document.getElementById("inputText").innerText =
                    data.input_text;

                document.getElementById("cleanedText").innerText =
                    data.cleaned_text;

                const sentimentElement =
                    document.getElementById("sentiment");

                sentimentElement.innerText =
                    data.sentiment;

                if(data.sentiment.includes("Positive")){

                    sentimentElement.className = "positive";

                }else{

                    sentimentElement.className = "negative";
                }

                document.getElementById("confidence").innerText =
                    data.confidence_score;

                result.style.display = "block";

            }catch(error){

                alert("API Connection Error");

                console.log(error);
            }

            loading.style.display = "none";
        }

    </script>

</body>

</html>
